name: "CodeQL"

on:
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      actions: read
      contents: write
      pull-requests: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["go", "javascript-typescript"]

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with: { persist-credentials: true }

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@5d4e8d1aca955e8d8589aabd499c5cae939e33c7 # v4.31.9
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@5d4e8d1aca955e8d8589aabd499c5cae939e33c7 # v4.31.9

      - name: Perform CodeQL Analysis
        id: codeql
        uses: github/codeql-action/analyze@5d4e8d1aca955e8d8589aabd499c5cae939e33c7 # v4.31.9
        with:
          category: "/language:${{matrix.language}}"
          output: ${{ runner.temp }}/codeql-results

      - name: Resolve SARIF File Path
        id: sarif-resolver
        run: |
          # Locate the SARIF file produced by CodeQL
          SARIF_FILE=$(find ${{ runner.temp }}/codeql-results -type f -name "*.sarif" | head -n 1)

          if [ -z "$SARIF_FILE" ]; then
            echo "::error::No SARIF file was produced in ${{ runner.temp }}/codeql-results"
            exit 1
          fi

          echo "sarif_path=$SARIF_FILE" >> "$GITHUB_OUTPUT"
          echo "Resolved SARIF path: $SARIF_FILE"

      - name: Triage
        uses: alexpermiakov/sast-triage@v1
        with:
          provider: openai
          model: deepseek-v4-pro
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          base-url: https://api.deepseek.com
          max-findings-budget: 100
          sarif-file: ${{ steps.sarif-resolver.outputs.sarif_path }}
          effort: large
          scope: full
          mode: baseline
          cache-write: pr
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with: { persist-credentials: false }
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@e639db99335bc9038abc0e066dfcd72e23d26fb4 # v0.3.0
